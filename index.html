<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Date v1.1</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&family=Sriracha&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #FDFBF7;
            --card-bg: #FFFFFF;
            --text-main: #4A3E3D;
            --text-sub: #8C7A78;
            --primary: #D98880;
            --primary-hover: #C1736C;
            --accent: #E6B0AA;
            --shadow: rgba(140, 122, 120, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Mitr', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: radial-gradient(var(--accent) 0.5px, transparent 0.5px), radial-gradient(var(--accent) 0.5px, var(--bg-color) 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        header h1 {
            font-family: 'Sriracha', cursive;
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px var(--shadow);
        }

        header p {
            font-size: 0.95rem;
            color: var(--text-sub);
            margin-bottom: 30px;
        }

        /* Screen States */
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
        }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .menu-card {
            background: var(--card-bg);
            border: 2px solid var(--accent);
            border-radius: 16px;
            padding: 22px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px var(--shadow);
            text-align: left;
        }

        .menu-card:hover, .menu-card:active {
            transform: translateY(-2px);
            border-color: var(--primary);
            box-shadow: 0 6px 12px var(--shadow);
        }

        .menu-card h3 {
            font-size: 1.3rem;
            color: var(--primary);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .menu-card p {
            font-size: 0.88rem;
            color: var(--text-sub);
            font-weight: 300;
            line-height: 1.4;
        }

        /* Game Screen Box */
        .game-box {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 10px 25px var(--shadow);
            border: 1px solid rgba(230, 176, 170, 0.3);
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .badge {
            display: inline-block;
            background: #FAEDCD;
            color: #D4A373;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 20px;
            align-self: center;
        }

        .question-box {
            font-size: 1.35rem;
            line-height: 1.6;
            color: var(--text-main);
            margin: auto 0;
            word-break: break-word;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .counter {
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-top: 15px;
            font-weight: 300;
        }

        /* Controls */
        .control-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 25px;
        }

        button {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            grid-column: span 2;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(217, 136, 128, 0.3);
        }

        .btn-primary:hover, .btn-primary:active {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: #F0EAE1;
            color: var(--text-main);
        }

        .btn-back {
            background-color: transparent;
            color: var(--text-sub);
            text-decoration: underline;
            font-size: 0.9rem;
            grid-column: span 2;
            margin-top: 10px;
            padding: 5px;
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Cozy Date ☕</h1>
            <p>v1.1 Extended • ขยับความใกล้ชิดผ่านบทสนทนาฮีลใจ</p>
        </header>

        <!-- STEP 1: หน้าแรกสุด เลือกประเภทเกมหลัก -->
        <div id="step1-screen" class="screen active fade-in">
            <div class="menu-grid">
                <div class="menu-card" onclick="goToStep2('deeptalk')">
                    <h3>💬 Deep Talk Game</h3>
                    <p>บทสนทนาเจาะลึก ทบทวนความคิด และแลกเปลี่ยนตัวตนในแง่มุมต่างๆ</p>
                </div>
                <div class="menu-card" onclick="goToStep2('wouldyourather')">
                    <h3>🤔 Would You Rather?</h3>
                    <p>คำถามวัดใจเลือกข้างสุดตลกและท้าทายความคิด มีทั้งโหมดขำๆ และโหมดคิดหนัก</p>
                </div>
            </div>
        </div>

        <!-- STEP 2: หน้าเลือก Dating Stage / Sub-Category -->
        <div id="step2-screen" class="screen fade-in">
            <!-- จะแสดงปุ่มตามประเภทที่เลือกจาก Step 1 (Render ผ่าน JavaScript) -->
            <div id="stage-options" class="menu-grid"></div>
            <button class="btn-back" onclick="backToStep1()">◀ ย้อนกลับไปหน้าแรก</button>
        </div>

        <!-- STEP 3: หน้าจอสำหรับเล่นเกม -->
        <div id="game-screen" class="screen fade-in">
            <div class="game-box">
                <div id="mood-badge" class="badge">Mode</div>
                <div id="question-text" class="question-box">คำถามกำลังโหลด...</div>
                
                <div>
                    <div id="question-counter" class="counter">ข้อที่ 0/0</div>
                    <div class="control-btns">
                        <button class="btn-primary" onclick="nextQuestion()">สุ่มคำถามถัดไป ✨</button>
                        <button class="btn-secondary" onclick="skipQuestion()">ข้ามข้อนี้ ⏭️</button>
                        <button class="btn-secondary" onclick="resetCurrentCategory()">เริ่มหมวดนี้ใหม่ 🔄</button>
                        <button class="btn-back" onclick="backToStep2()">◀ เปลี่ยนระดับ/Stage</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>

                questions: [

                    "อะไรคือความสำเร็จเล็กๆ ในสัปดาห์นี้ที่ทำให้คุณภูมิใจในตัวเอง?",

                    "สไตล์การแต่งตัวแบบไหนที่ทำให้คุณรู้สึกมั่นใจในตัวเองมากที่สุด?",

                    "ระหว่าง \"แต่งงานสาย/ไม่แต่งเลยแต่การเงินมั่นคงมาก\" กับ \"แต่งงานเร็วตั้งแต่อายุยังน้อยแต่ต้องช่วยกันกัดก้อนเกลือกิน\"",
                    "ระหว่าง \"คนรักทำความผิดกฎหมายร้ายแรงแต่ทำเพื่อปกป้องคุณ\" กับ \"คนรักทำสิ่งที่ถูกต้องตามกฎหมายแต่ทำให้คุณเดือดร้อนขั้นสุด\"",
                    "ระหว่าง \"ลืมอดีตทั้งหมดของตัวเอง (จำไม่ได้เลยว่าเคยเป็นใคร)\" กับ \"ลืมหน้าและเรื่องราวของทุกคนที่เคยผ่านเข้ามาในชีวิต\"",
                    "ระหว่าง \"มีคนรักที่อารมณ์ร้อนแต่ใจดีและเปย์หนัก\" กับ \"มีคนรักที่ใจเย็นมากแต่เย็นชาและไม่ค่อยใส่ใจความรู้สึก\"",
                    "ระหว่าง \"ทำงานที่รักมากแต่ได้เงินเดือนน้อยพอกินไปวันๆ\" กับ \"ทำงานที่เกลียดมากแต่ได้เงินเดือนหลักล้าน\"",
                    "ระหว่าง \"รู้ว่าแฟนแอบเช็คโทรศัพท์ทุกวัน\" กับ \"แฟนไม่เคยสนใจหรือเช็คอะไรเกี่ยวกับคุณเลย\"",
                    "ระหว่าง \"ตายก่อนคนรัก\" กับ \"อยู่ดูคนรักตายจากไปก่อน\"",
                    "ระหว่าง \"มีเพื่อนสนิทแค่คนเดียวที่ยอมตายแทนกันได้\" กับ \"มีเพื่อนฝูงมากมายที่ไปไหนไปกันแต่พึ่งพาเรื่องซีเรียสไม่ได้\"",
                    "ระหว่าง \"สามารถอ่านใจคนรักได้ตลอดเวลา\" กับ \"คนรักสามารถอ่านใจคุณได้ตลอดเวลา\"",
                    "ระหว่าง \"ถูกลบตัวตนออกไปจากความทรงจำของทุกคนบนโลกเหมือนไม่เคยมีอยู่\" กับ \"ทุกคนจำคุณได้แต่นึกถึงคุณในแง่ลบเสมอ\"",
                    "ระหว่าง \"ยอมอยู่กับความจริงที่เจ็บปวดลึกๆ\" กับ \"อยู่กับความสุขที่เกิดจากการหลอกตัวเอง\"",
                    "ระหว่าง \"คนรักมีเวลาให้คุณตลอด 24 ชั่วโมงจนแทบไม่มีพื้นที่ส่วนตัว\" กับ \"คนรักยุ่งมากจนได้เจอกันแค่เดือนละครั้ง\"",
                    "ระหว่าง \"ไม่มีเซ็กส์เลยตลอดชีวิตแต่รักกันหวานชื่น\" กับ \"มีเซ็กส์ที่ยอดเยี่ยมมากแต่ไม่มีความรักความผูกพันให้กันเลย\"",
                    "ระหว่าง \"ถูกหักหลังเรื่องเงินจากเพื่อนสนิท\" กับ \"ถูกหักหลังเรื่องความรักจากคนที่ไว้ใจที่สุด\"",
                    "ระหว่าง \"มีความสามารถในการเปลี่ยนอดีตได้ 1 เรื่อง\" กับ \"มีความสามารถในการกำหนดอนาคตได้ 1 เรื่อง\"",
                    "ระหว่าง \"คนรักเก่าของแฟนมาขออยู่ร่วมบ้านด้วยชั่วคราว\" กับ \"คุณต้องไปอยู่ร่วมบ้านกับแฟนเก่าของตัวเองชั่วคราว\"",
                    "ระหว่าง \"เลือกที่จะรับรู้คำโกหกของคนอื่นทั้งหมด\" กับ \"เลือกที่จะไม่รับรู้อะไรเลยและใช้ชีวิตไปตามปกติ\"",
                    "ระหว่าง \"จบความสัมพันธ์แบบเดินจากกันไปเคลียร์ๆ\" กับ \"จบความสัมพันธ์แบบ Ghosting (หายไปเงียบๆ ไม่มีคำลา)\""
                ]
            }
        };

        // ข้อมูลสเตจเพื่อมาจัดหมวดใน Step 2
        const stageConfig = {
            deeptalk: [
                { key: 'deep1', label: '🧊 Level 1: First Date / Perspective' },
                { key: 'deep2', label: '☕ Level 2: Getting Closer / Core Values' },
                { key: 'deep3', label: '🌙 Level 3: Safe Zone / Vulnerability' },
                { key: 'deep4', label: '🕯️ Level 4: Deeply in Love / Us & Future' }
            ],
            wouldyourather: [
                { key: 'would1', label: '🎈 Casual Mode (ตลก ขำๆ คลายเครียด)' },
                { key: 'would2', label: '🧠 Tricky Mode (เลือกยาก วัดใจทัศนคติ)' }
            ]
        };

        let currentQuestionsList = [];
        let usedQuestionsList = [];
        let currentModeKey = '';
        let currentMainGroup = ''; // 'deeptalk' หรือ 'wouldyourather'
        let totalInMode = 0;

        // สลับไปหน้า Step 2 และเจนปุ่มตามกลุ่มที่เลือก
        function goToStep2(mainGroup) {
            currentMainGroup = mainGroup;
            const optionsContainer = document.getElementById('stage-options');
            optionsContainer.innerHTML = ''; // Clear เก่า

            // ดึง Configuration ของ Stage มาสร้าง Card ปุ่มกด
            stageConfig[mainGroup].forEach(stage => {
                const data = questionBank[stage.key];
                const card = document.createElement('div');
                card.className = 'menu-card';
                card.onclick = () => startGame(stage.key);
                card.innerHTML = `
                    <h3>${stage.label}</h3>
                    <p>${data.desc}</p>
                `;
                optionsContainer.appendChild(card);
            });

            switchScreen('step2-screen');
        }

        function backToStep1() {
            switchScreen('step1-screen');
        }

        function backToStep2() {
            goToStep2(currentMainGroup);
        }

        // เริ่มต้นเข้าสู้หน้าเกม (Step 3)
        function startGame(key) {
            currentModeKey = key;
            currentQuestionsList = [...questionBank[key].questions];
            usedQuestionsList = [];
            totalInMode = currentQuestionsList.length;

            shuffleArray(currentQuestionsList); // สุ่มคำถามตั้งแต่เริ่ม

            document.getElementById('mood-badge').innerText = questionBank[key].title;
            switchScreen('game-screen');
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQuestionsList.length === 0) {
                document.getElementById('question-text').innerHTML = "✨ คุณได้คุยครบทุกข้อในหมวดนี้แล้วครับ! เก่งมาก ลองเปลี่ยนระดับเพื่อพูดคุยต่อได้นะ 🥰";
                document.getElementById('question-counter').innerText = `ผ่านไปแล้ว ${usedQuestionsList.length}/${totalInMode} ข้อ`;
                return;
            }

            const currentQ = currentQuestionsList.shift();
            usedQuestionsList.push(currentQ);

            const qBox = document.getElementById('question-text');
            qBox.classList.remove('fade-in');
            void qBox.offsetWidth; // Trigger reflow เพื่อให้แอนิเมชันทำงานใหม่
            qBox.classList.add('fade-in');
            
            qBox.innerText = currentQ;
            document.getElementById('question-counter').innerText = `ข้อที่ ${usedQuestionsList.length}/${totalInMode}`;
        }

        function skipQuestion() {
            if (usedQuestionsList.length > 0) {
                const skippedQ = usedQuestionsList.pop();
                currentQuestionsList.push(skippedQ); // เอาไปวนต่อแถวใหม่
                shuffleArray(currentQuestionsList); // สุ่มอีกรอบไม่ให้เจอซ้ำทันที
                nextQuestion();
            }
        }

        function resetCurrentCategory() {
            if (confirm("คุณต้องการรีเซ็ตเพื่อเริ่มต้นเล่นระดับนี้ใหม่ตั้งแต่ข้อแรกใช่ไหม?")) {
                startGame(currentModeKey);
            }
        }

        // Helper ฟังก์ชันสลับหน้าจอซ่อน/แสดง
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
        }

        // ฟังก์ชันสุ่มอาเรย์ (Fisher-Yates Shuffle Algorithm)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
    </script>
</body>
